version: "0.1"

variables:
  SLURM_ACCOUNT:
    description: "SLURM account"
    value: your_slurm_account
  SLURM_PARTITION:
    description: "SLURM partition"
    value: your_slurm_partition
  SERVED_MODEL_NAME:
    description: "Served model name"
    value: Qwen/Qwen2.5-VL-72B-Instruct
  TP_SIZE:
    description: "Tensor parallel size"
    value: 4
  NUM_GPUS_PER_NODE:
    description: "GPUs per node"
    value: 4
  NUM_SERVER_NODES:
    description: "Number of server nodes"
    value: 1
  NUM_PROMPTS:
    description: "Number of prompts to benchmark (swept via replicas)"
    value: 1
    domain: [1, 16, 32, 64, 128, 256, 512]

artifacts:
  - name: model
    description: "Qwen2.5-VL model path"
    uri: huggingface://Qwen/Qwen2.5-VL-72B-Instruct
  - name: vllm_image
    description: "vLLM Docker image"
    uri: docker://vllm/vllm-openai:latest
  - name: output_dir
    description: "Output directory path"
    uri: fs://./out
    writable: true

backends:
  - name: slurm_cluster
    type: slurm
    default: true
    time: 00:60:00
    nodes: ${{ variables.NUM_SERVER_NODES }}
    partition: ${{ variables.SLURM_PARTITION }}
    account: ${{ variables.SLURM_ACCOUNT }}
    gpus_per_node: ${{ variables.NUM_GPUS_PER_NODE }}
    extra_args:
      - "--gpus-per-node=${{ variables.NUM_GPUS_PER_NODE }}"

operators:
  - name: vllm_runtime
    type: srun
    container_image: ${{ artifacts.vllm_image.path }}
    container_writable: true
    container_mount_home: false
    extra_args:
      - "--shm-size=128g"

workflow:
  name: qwen_2_5_vllm
  timeout: 60m
  variables:
    HEAD_NODE_IP:
      description: "Head node IP"
      value: "${{ backends.slurm_cluster.nodes[0].ip_address }}"
  tasks:
    - name: gpu_monitor
      operator: vllm_runtime
      script:
        - echo "Starting gpu monitor"
        - >
          nvidia-smi --query-gpu=index,utilization.gpu,utilization.memory,temperature.gpu,temperature.memory,power.draw,clocks.sm,clocks.mem,memory.total,memory.used 
          --format=csv,noheader,nounits -lms 2000 | 
          while IFS= read -r input || [ -n "$input" ] ; 
          do timestamp=$(date +%s%3N); 
          printf "%s.%s,%s\n" "${timestamp:0:10}" "${timestamp:10:3}" "${input}"; 
          done 
          >> ${{ artifacts.output_dir.path }}/${SLURM_JOB_ID}/${SLURM_JOB_ID}_gpu_monitor_node_${SLURM_NODEID}_${SLURMD_NODENAME}.log
      probes:
        readiness:
          log_watch:
            regex_pattern: "Starting gpu monitor"
      resources:
        nodes:
          indices: [0]

    - name: vllm_server
      operator: vllm_runtime
      resources:
        nodes:
          indices: [0]
      script:
        - export CUDA_VISIBLE_DEVICES=0,1,2,3
        - >
          vllm serve ${{ artifacts.model.path }}
          --host 0.0.0.0
          --port 8000
          --served-model-name ${{ variables.SERVED_MODEL_NAME }}
          --tensor-parallel-size ${{ variables.TP_SIZE }}
          --mm-encoder-tp-mode data
          --limit-mm-per-prompt '{"image":2,"video":0}'
          --trust-remote-code
      probes:
        readiness:
          tcp_port:
            port: 8000

    - name: benchmark
      operator: vllm_runtime
      resources:
        nodes:
          indices: [0]
      replicas:
        variables:
          - NUM_PROMPTS
        policy: sequential
      script:
        - echo "Running benchmark with num_prompts=${NUM_PROMPTS}"
        - >
          vllm bench serve 
          --host ${{ variables.HEAD_NODE_IP }} 
          --port 8000 
          --backend openai-chat 
          --endpoint /v1/chat/completions 
          --endpoint-type openai-chat 
          --model ${{ variables.SERVED_MODEL_NAME }} 
          --dataset-name hf 
          --dataset-path lmarena-ai/VisionArena-Chat 
          --num-prompts ${NUM_PROMPTS}
      depends_on:
        - vllm_server
      outputs:
        - pattern: "Mean TTFT (ms):{:s}{mean_ttft:f}"
          metrics:
            mean_ttft:
              type: float
              description: "Mean TTFT"
              unit: ms
