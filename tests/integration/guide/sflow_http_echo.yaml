version: "0.1"

workflow:
  name: http_echo

  tasks:
    - name: echo_server
      script:
        - |
          python3 - <<'PY'
          import threading
          from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
          from urllib.parse import urlparse, parse_qs

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  parsed = urlparse(self.path)
                  if parsed.path != "/echo":
                      self.send_response(404)
                      self.end_headers()
                      self.wfile.write(b"not found")
                      return

                  qs = parse_qs(parsed.query)
                  msg = (qs.get("msg") or [""])[0]
                  body = msg.encode("utf-8")

                  self.send_response(200)
                  self.send_header("Content-Type", "text/plain; charset=utf-8")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

                  # Shutdown after serving exactly one request so the workflow can finish.
                  threading.Thread(target=self.server.shutdown, daemon=True).start()

              def log_message(self, fmt, *args):
                  # keep logs minimal
                  return

          server = ThreadingHTTPServer(("127.0.0.1", 8000), Handler)
          print("server: READY on 127.0.0.1:8000")
          server.serve_forever()
          print("server: EXIT")
          PY
      probes:
        readiness:
          tcp_port:
            port: 8000
          timeout: 30
          interval: 1

    - name: echo_client
      depends_on:
        - echo_server
      script:
        - |
          python3 - <<'PY'
          from urllib import request

          url = "http://127.0.0.1:8000/echo?msg=hello"
          with request.urlopen(url, timeout=10) as resp:
              body = resp.read().decode("utf-8", errors="replace")
              print(f"client: status={resp.status}")
              print(f"client: body={body}")
          PY
