version: "0.1"

variables:
  # Override these via `--set` as needed for your cluster.
  SLURM_ACCOUNT:
    value: your_slurm_account
  SLURM_PARTITION:
    value: your_slurm_partition
  SLURM_TIME:
    value: "00:05:00"
  SLURM_NODES:
    value: 1
  GPUS_PER_NODE:
    value: 1

backends:
  - name: slurm_cluster
    type: slurm
    default: true
    gpus_per_node: ${{ variables.GPUS_PER_NODE }}
    account: ${{ variables.SLURM_ACCOUNT }}
    partition: ${{ variables.SLURM_PARTITION }}
    time: ${{ variables.SLURM_TIME }}
    nodes: ${{ variables.SLURM_NODES }}
    srun:
      extra_args:
        - "--overlap"
        - "--mpi=pmix"

workflow:
  name: http_echo_slurm

  tasks:
    # NOTE: Both tasks are pinned to node 0 so the client can reach the server via 127.0.0.1.
    - name: echo_server
      resources:
        nodes:
          indices: [0]
      script:
        - |
          /usr/bin/python - <<'PY'
          import threading
          from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
          from urllib.parse import urlparse, parse_qs

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  parsed = urlparse(self.path)
                  if parsed.path != "/echo":
                      self.send_response(404)
                      self.end_headers()
                      self.wfile.write(b"not found")
                      return

                  qs = parse_qs(parsed.query)
                  msg = (qs.get("msg") or [""])[0]
                  body = msg.encode("utf-8")

                  self.send_response(200)
                  self.send_header("Content-Type", "text/plain; charset=utf-8")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

                  # Shutdown after serving exactly one request so the workflow can finish.
                  threading.Thread(target=self.server.shutdown, daemon=True).start()

              def log_message(self, fmt, *args):
                  return

          server = ThreadingHTTPServer(("0.0.0.0", 8000), Handler)
          print("server: READY on 0.0.0.0:8000")
          server.serve_forever()
          print("server: EXIT")
          PY
      probes:
        readiness:
          tcp_port:
            port: 8000
          timeout: 60
          interval: 1

    - name: echo_client
      depends_on:
        - echo_server
      resources:
        nodes:
          indices: [0]
      script:
        - |
          /usr/bin/python666 - <<'PY'
          from urllib import request

          url = "http://${{ backends.slurm_cluster.nodes[0].ip_address }}:8000/echo?msg=hello"
          with request.urlopen(url, timeout=10) as resp:
              body = resp.read().decode("utf-8", errors="replace")
              print(f"client: status={resp.status}")
              print(f"client: body={body}")
          PY
