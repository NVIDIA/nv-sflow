version: "0.1"

variables:
  # Variables has 2 ways of access, and can be overridden by --set flag in sflow batch / sflow run command
  # 1. In YAML expressions: `${{ variables.NAME }}`, sflow will automatically resolve the expression and inject the value before the workflow is executed, it works across any fields in the yaml file, such as backends, operators, workflow, tasks, scripts, etc.
  # 2. In task scripts (as env var): `${NAME}`, the variable can also be accessed as an environment variable in the task script
  
  # Slurm Configuration - These will be skipped if you use 'sflow batch -f sflow.yaml --submit' to launch the workflow and overwrite the variables in cli args
  SLURM_ACCOUNT:
    description: "SLURM account"
    value: your_slurm_account
  SLURM_PARTITION:
    description: "SLURM partition"
    value: your_slurm_partition
  SLURM_TIMELIMIT:
    description: "SLURM time limit"
    value: 120
  GPUS_PER_NODE:
    description: "GPUs per node"
    type: integer
    value: 4
  SLURM_NODES:
    description: "Number of nodes"
    value: 1

  # Model Configuration
  SERVED_MODEL_NAME:
    description: "Served model name"
    value: Qwen3-0-6B-FP8
  MODEL_NAME:
    description: "Model path"
    value: Qwen/Qwen3-0.6B-FP8

  # Prefill Server Configuration
  NUM_CTX_SERVERS:
    description: "Number of context/prefill servers"
    value: 1
  CTX_TP_SIZE:
    description: "Context tensor parallel size"
    type: integer
    value: 2
  CTX_DP_SIZE:
    description: "Context data parallel size"
    type: integer
    value: 1
  CTX_EP_SIZE:
    description: "Context expert parallel size"
    type: integer
    value: 1
  CTX_MOE_TP_SIZE:
    description: "Context MOE tensor parallel size"
    type: integer
    value: 1
  CTX_PP_SIZE:
    description: "Context pipeline parallel size"
    type: integer
    value: 1
  CTX_GPUS_PER_WORKER:
    description: "GPUs per prefill worker"
    type: integer
    value: ${{ variables.CTX_TP_SIZE * variables.CTX_DP_SIZE * variables.CTX_PP_SIZE }}
  CTX_BATCH_SIZE:
    description: "Context batch size"
    value: 128
  CTX_MAX_NUM_TOKENS:
    description: "Context max number of tokens"
    value: 4096
  CTX_MAX_SEQ_LEN:
    description: "Context max sequence length"
    value: 1280
  CTX_FREE_GPU_MEMORY_FRACTION:
    description: "Context free GPU memory fraction"
    value: 0.9
  CTX_ENABLE_ATTENTION_DP:
    description: "Context enable attention DP"
    value: false
  KV_CACHE_DTYPE:
    description: "KV cache dtype"
    value: fp8

  # Decode Server Configuration
  NUM_GEN_SERVERS:
    description: "Number of generation/decode servers"
    value: 1
  GEN_TP_SIZE:
    description: "Generation tensor parallel size"
    type: integer
    value: 2
  GEN_DP_SIZE:
    description: "Generation data parallel size"
    type: integer
    value: 1
  GEN_EP_SIZE:
    description: "Generation expert parallel size"
    type: integer
    value: 1
  GEN_MOE_TP_SIZE:
    description: "Generation MOE tensor parallel size"
    type: integer
    value: 1
  GEN_PP_SIZE:
    description: "Generation pipeline parallel size"
    type: integer
    value: 1
  GEN_GPUS_PER_WORKER:
    description: "GPUs per decode worker"
    type: integer
    value: ${{ variables.GEN_TP_SIZE * variables.GEN_DP_SIZE * variables.GEN_PP_SIZE }}
  GEN_BATCH_SIZE:
    description: "Generation batch size"
    value: 128
  GEN_MAX_NUM_TOKENS:
    description: "Generation max number of tokens"
    value: 4096
  GEN_MAX_SEQ_LEN:
    description: "Generation max sequence length"
    value: 2304
  GEN_FREE_GPU_MEMORY_FRACTION:
    description: "Generation free GPU memory fraction"
    value: 0.9
  GEN_ENABLE_ATTENTION_DP:
    description: "Generation enable attention DP"
    value: false

  # Extra Arguments - You can append any optional arguments to the trtllm-llmapi-launch command
  EXTRA_FRONTEND_ARGS:
    description: "Extra frontend arguments"
    value: ""
  EXTRA_PREFILL_ARGS:
    description: "Extra prefill arguments"
    value: ""
  EXTRA_DECODE_ARGS:
    description: "Extra decode arguments"
    value: ""

  # Benchmark Configuration
  ISL:
    description: "Input sequence length"
    value: 1024
  OSL:
    description: "Output sequence length"
    value: 1024
  MULTI_ROUND:
    description: "Number of benchmark rounds"
    value: 8
  CONCURRENCY:
    description: "Concurrency"
    value: 50
    domain: [50, 100]
  
  # Container Images
  AIPERF_IMAGE:
    description: "AIPerf container image"
    value: python:3.12-slim
  DYNAMO_IMAGE:
    description: "Dynamo TRTLLM container image"
    value: nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:0.8.0

  # Network device information, change per your cluster or comment out if not needed
  # NCCL_SOCKET_IFNAME:
  #   description: "NCCL socket interface name"
  #   value: enP5p9s0
  # GLOO_SOCKET_IFNAME:
  #   description: "Gloo socket interface name"
  #   value: enP5p9s0
  # TRTLLM_UCX_INTERFACE:
  #   description: "TRTLLM UCX interface"
  #   value: enP5p9s0

artifacts:
  # file type artifacts will be generated by sflow with the content defined in this yaml file, accessible as `${{ artifacts.NAME.path }}` in task scripts
  - name: LOCAL_MODEL_PATH
    uri: fs:///path/to/your/model
  - name: PREFILL_CONFIG
    uri: file://prefill_config.yaml
    content: |
      max_batch_size: ${{ variables.CTX_BATCH_SIZE }}
      max_num_tokens: ${{ variables.CTX_MAX_NUM_TOKENS }}
      max_seq_len: ${{ variables.CTX_MAX_SEQ_LEN }}
      tensor_parallel_size: ${{ variables.CTX_TP_SIZE }}
      moe_expert_parallel_size: ${{ variables.CTX_TP_SIZE }}
      enable_attention_dp: ${{ variables.CTX_ENABLE_ATTENTION_DP }}
      pipeline_parallel_size: ${{ variables.CTX_PP_SIZE }}
      cuda_graph_config: null
      print_iter_log: true
      disable_overlap_scheduler: true
      enable_chunked_prefill: false
      kv_cache_config:
        enable_block_reuse: false
        free_gpu_memory_fraction: ${{ variables.CTX_FREE_GPU_MEMORY_FRACTION }}
        dtype: ${{ variables.KV_CACHE_DTYPE }}
      cache_transceiver_config:
        max_tokens_in_buffer: ${{ variables.CTX_MAX_NUM_TOKENS }}
        backend: DEFAULT
  - name: DECODE_CONFIG
    uri: file://decode_config.yaml
    content: |
      tensor_parallel_size: ${{ variables.GEN_TP_SIZE }}
      moe_expert_parallel_size: ${{ variables.GEN_TP_SIZE }}
      enable_attention_dp: ${{ variables.GEN_ENABLE_ATTENTION_DP }}
      pipeline_parallel_size: ${{ variables.GEN_PP_SIZE }}
      max_batch_size: ${{ variables.GEN_BATCH_SIZE }}
      max_num_tokens: ${{ variables.GEN_MAX_NUM_TOKENS }}
      max_seq_len: ${{ variables.GEN_MAX_SEQ_LEN }}
      cuda_graph_config:
        enable_padding: true
        max_batch_size: ${{ variables.GEN_BATCH_SIZE }}
      print_iter_log: true
      enable_chunked_prefill: false
      kv_cache_config:
        enable_block_reuse: false
        free_gpu_memory_fraction: ${{ variables.GEN_FREE_GPU_MEMORY_FRACTION }}
        dtype: ${{ variables.KV_CACHE_DTYPE }}
      cache_transceiver_config:
        max_tokens_in_buffer: ${{ variables.CTX_MAX_NUM_TOKENS }}
        backend: DEFAULT
      stream_interval: 20
backends:
  - name: slurm_cluster
    type: slurm
    default: true
    time: ${{ variables.SLURM_TIMELIMIT }}
    nodes: ${{ variables.SLURM_NODES }}
    partition: ${{ variables.SLURM_PARTITION }}
    account: ${{ variables.SLURM_ACCOUNT }}
    gpus_per_node: ${{ variables.GPUS_PER_NODE }}
    # In some cluster like Corewaeve / OCI, you may need to add --gpus-per-node=N directive to the sbatch / salloc command
    # For GB200 / GB300 clusters, you may need to add --segment=N directive to make sure allocated nodes are in same network domain
    # extra_args:
    #   - "--gpus-per-node=${{ variables.GPUS_PER_NODE }}"
    #   - "--segment=${{ variables.SLURM_NODES }}"

operators:
  - name: dynamo_trtllm
    type: srun
    container_image: ${{ variables.DYNAMO_IMAGE }}
    container_writable: true
    mpi: pmix
  - name: aiperf
    type: srun
    container_image: ${{ variables.AIPERF_IMAGE }}
    container_writable: true
    mpi: pmix

workflow:
  name: dynamo_trtllm_disagg
  timeout: 115m # Slightly less than SLURM_TIMELIMIT

  variables:
    # Workflow level variables will overwrite the variables defined in global variables section if using same name
    HEAD_NODE_IP:
      description: "Head node IP (resolved after allocation)"
      value: "${{ backends.slurm_cluster.nodes[0].ip_address }}"
    ETCD_ENDPOINTS:
      description: "ETCD endpoints"
      value: "${{ backends.slurm_cluster.nodes[0].ip_address }}:2379"
    NATS_SERVER:
      description: "NATS server URL"
      value: "nats://${{ backends.slurm_cluster.nodes[0].ip_address }}:4222"

  tasks:
    - name: load_image
      operator: 
        name: dynamo_trtllm
        ntasks: ${{ variables.SLURM_NODES }}
        ntasks_per_node: 1
      script:
        - echo "Image Loaded"
        - sleep 3600
      probes:
        readiness:
          log_watch:
            match_pattern: "Image Loaded"
            match_count: ${{ variables.SLURM_NODES }}
          timeout: 1200
          interval: 2
    
    - name: gpu_monitor
      operator: 
        name: dynamo_trtllm
        ntasks_per_node: 1
      resources:
        nodes:
          count: ${{ variables.SLURM_NODES }}
      script:
        - echo "Starting gpu monitor"
        - >
          nvidia-smi --query-gpu=index,utilization.gpu,utilization.memory,temperature.gpu,temperature.memory,power.draw,clocks.sm,clocks.mem,memory.total,memory.used 
          --format=csv,noheader,nounits -lms 2000 | 
          while IFS= read -r input || [ -n "$input" ] ; 
          do timestamp=$(date +%s%3N); 
          printf "%s.%s,%s\n" "${timestamp:0:10}" "${timestamp:10:3}" "${input}"; 
          done 
          >> ${SFLOW_TASK_OUTPUT_DIR}/gpu_monitor_node_${SLURM_NODEID}_${SLURMD_NODENAME}.log
      probes:
        readiness:
          log_watch:
            match_pattern: "Starting gpu monitor"
          timeout: 300
          interval: 2
      depends_on:
        - load_image

    - name: nats_server
      operator: dynamo_trtllm
      script:
        - nats-server -js
      resources:
        nodes:
          indices: [0]
      probes:
        readiness:
          tcp_port:
            port: 4222
          timeout: 300
          interval: 2
      depends_on:
        - load_image

    - name: etcd_server
      operator: dynamo_trtllm
      script:
        - >
          etcd --listen-client-urls "http://0.0.0.0:2379"
          --advertise-client-urls "http://0.0.0.0:2379"
          --listen-peer-urls "http://0.0.0.0:2380"
          --initial-advertise-peer-urls "http://${HEAD_NODE_IP}:2380"
          --initial-cluster "default=http://${HEAD_NODE_IP}:2380"
          --data-dir /tmp/etcd
      resources:
        nodes:
          indices: [0]
      probes:
        readiness:
          tcp_port:
            port: 2379
          timeout: 300
          interval: 2
      depends_on:
        - load_image
    
    - name: frontend_server
      operator: dynamo_trtllm
      script:
        - python3 -m dynamo.frontend --http-port 8000 ${{ variables.EXTRA_FRONTEND_ARGS }}
      resources:
        nodes:
          indices: [0]
      probes:
        readiness:
          tcp_port:
            port: 8000
          timeout: 300
          interval: 5
      depends_on:
        - nats_server
        - etcd_server

    - name: prefill_server
      operator:
        name: dynamo_trtllm
        ntasks: ${{ variables.CTX_GPUS_PER_WORKER }}
        ntasks_per_node: ${{ [ variables.CTX_GPUS_PER_WORKER, variables.GPUS_PER_NODE ] | min }}
      replicas:
        count: ${{ variables.NUM_CTX_SERVERS }}
        policy: "parallel"
      script:
        - set -x
        - echo ${CUDA_VISIBLE_DEVICES}
        - export TLLM_LOG_LEVEL=INFO
        - export TRTLLM_MOE_ENABLE_ALLTOALL_WITHOUT_ALLGATHER=1
        - export TRTLLM_MOE_USE_LOW_PRECISION_COMBINE=1
        - env | grep TLLM
        - env | grep UCX
        - unset UCX_TLS
        - >
          trtllm-llmapi-launch python3 -m dynamo.trtllm
          --model-path ${{ artifacts.LOCAL_MODEL_PATH.path }}
          --served-model-name ${SERVED_MODEL_NAME}
          --disaggregation-mode prefill
          --extra-engine-args ${{ artifacts.PREFILL_CONFIG.path }} ${EXTRA_PREFILL_ARGS}
      resources:
        gpus:
          count: ${{ variables.CTX_GPUS_PER_WORKER }}
      depends_on:
        - frontend_server
      probes:
        readiness:
          http_post:
            url: "http://${{ backends.slurm_cluster.nodes[0].ip_address }}:8000/v1/chat/completions"
            headers:
              Content-Type: "application/json"
            body: '{"model": "${{ variables.SERVED_MODEL_NAME }}", "messages": [{"role": "user", "content": "hi"}], "max_tokens": 1}'
          timeout: 1200
          interval: 20
        failure:
          log_watch:
            match_pattern: "Traceback (most recent call last)"
            match_count: 5
          interval: 30
      retries:
        count: 3
        interval: 30
        backoff: 2

    - name: decode_server
      operator:
        name: dynamo_trtllm
        ntasks: ${{ variables.GEN_GPUS_PER_WORKER }}
        ntasks_per_node: ${{ [ variables.GEN_GPUS_PER_WORKER, variables.GPUS_PER_NODE ] | min }}
      replicas:
        count: ${{ variables.NUM_GEN_SERVERS }}
        policy: "parallel"
      script:
        - set -x
        - echo ${CUDA_VISIBLE_DEVICES}
        - export TLLM_LOG_LEVEL=INFO
        - export TRTLLM_MOE_ENABLE_ALLTOALL_WITHOUT_ALLGATHER=1
        - export TRTLLM_MOE_USE_LOW_PRECISION_COMBINE=1
        - env | grep TLLM
        - env | grep UCX
        - unset UCX_TLS
        - >
          trtllm-llmapi-launch python3 -m dynamo.trtllm
          --model-path ${{ artifacts.LOCAL_MODEL_PATH.path }}
          --served-model-name ${SERVED_MODEL_NAME}
          --disaggregation-mode decode
          --extra-engine-args ${{ artifacts.DECODE_CONFIG.path }} ${EXTRA_DECODE_ARGS}
      resources:
        gpus:
          count: ${{ variables.GEN_GPUS_PER_WORKER }}
      depends_on:
        - frontend_server
      probes:
        readiness:
          http_post:
            url: "http://${{ backends.slurm_cluster.nodes[0].ip_address }}:8000/v1/chat/completions"
            headers:
              Content-Type: "application/json"
            body: '{"model": "${{ variables.SERVED_MODEL_NAME }}", "messages": [{"role": "user", "content": "hi"}], "max_tokens": 1}'
          timeout: 1200
          interval: 20
        failure:
          log_watch:
            match_pattern: "Traceback (most recent call last)"
            match_count: 5
          interval: 30
      retries:
        count: 3
        interval: 30
        backoff: 2

    - name: benchmark
      operator:
        name: aiperf
        ntasks: 1
      script:
        - pip install aiperf==0.3.0
        - set -x
        - export COLUMNS=200
        - >
          aiperf profile --artifact-dir ${SFLOW_WORKFLOW_OUTPUT_DIR}/aiperf_concurrency_${CONCURRENCY}
          --model ${{ variables.SERVED_MODEL_NAME }}
          --tokenizer ${{ artifacts.LOCAL_MODEL_PATH.path }}
          --endpoint-type chat
          --endpoint /v1/chat/completions
          --streaming
          --url http://${{ variables.HEAD_NODE_IP }}:8000
          --synthetic-input-tokens-mean ${{ variables.ISL }}
          --synthetic-input-tokens-stddev 0
          --output-tokens-mean ${{ variables.OSL }}
          --output-tokens-stddev 0
          --extra-inputs "max_tokens:${{ variables.OSL }}"
          --extra-inputs "min_tokens:${{ variables.OSL }}"
          --extra-inputs "ignore_eos:true"
          --extra-inputs "{\"nvext\":{\"ignore_eos\":true}}"
          --extra-inputs "repetition_penalty:1.0"
          --extra-inputs "temperature: 0.0"
          --concurrency ${CONCURRENCY}
          --request-count $((${{ variables.MULTI_ROUND }}*${CONCURRENCY}))
          --warmup-request-count ${CONCURRENCY}
          --num-dataset-entries $((${{ variables.MULTI_ROUND }}*${CONCURRENCY}))
          --random-seed 100
          -H 'Authorization: Bearer NOT USED'
          -H 'Accept: text/event-stream'
          --record-processors 8
          --ui simple
        - echo "Benchmarking finished"
      resources:
        nodes:
          indices: [0]
      replicas:
        variables:
          - CONCURRENCY
        policy: sequential
      depends_on:
        - prefill_server
        - decode_server
        - frontend_server
