# vLLM aggregated (non-disaggregated) server task and its configuration.
# Merge all files for a complete run:
#   sflow compose slurm_config.yaml common_workflow.yaml vllm/agg.yaml benchmark_aiperf.yaml \
#     --set DYNAMO_IMAGE=nvcr.io/nvidia/ai-dynamo/vllm-runtime:0.8.0 \
#     --missable-tasks prefill_server --missable-tasks decode_server

version: "0.1"

variables:
  # Aggregated Server Configuration
  NUM_AGG_SERVERS:
    description: "Number of aggregated servers"
    type: integer
    value: 1
  AGG_TP_SIZE:
    description: "Tensor parallel size"
    type: integer
    value: 4
  AGG_DP_SIZE:
    description: "Data parallel size"
    type: integer
    value: 1
  AGG_PP_SIZE:
    description: "Pipeline parallel size"
    type: integer
    value: 1
  AGG_GPUS_PER_WORKER:
    description: "GPUs per aggregated worker"
    type: integer
    value: ${{ variables.AGG_TP_SIZE * variables.AGG_DP_SIZE * variables.AGG_PP_SIZE }}
  AGG_NODES_PER_WORKER:
    description: "Nodes per aggregated worker"
    type: integer
    value: ${{ [variables.AGG_GPUS_PER_WORKER // variables.GPUS_PER_NODE, 1] | max }}
  AGG_BATCH_SIZE:
    description: "Batch size (max num seqs)"
    type: integer
    value: 128
  AGG_MAX_NUM_TOKENS:
    description: "Max number of batched tokens"
    type: integer
    value: 4096
  EXTRA_AGG_ARGS:
    description: "Extra aggregated server arguments"
    value: ""

workflow:
  name: dynamo_benchmark
  tasks:
    - name: agg_server
      operator:
        name: dynamo
        ntasks_per_node: 1
      replicas:
        count: ${{ variables.NUM_AGG_SERVERS }}
        policy: "parallel"
      script:
        - set -x
        - echo ${CUDA_VISIBLE_DEVICES}
        - export FIRST_CUDA_DEVICE=$(echo ${CUDA_VISIBLE_DEVICES} | cut -d',' -f1)
        - export VLLM_NIXL_SIDE_CHANNEL_PORT=$((5557 + ${FIRST_CUDA_DEVICE}))
        - export NODE_RANK=${SLURM_NODEID}
        - export FIRST_NODE_IP=$(echo ${SFLOW_TASK_ASSIGNED_NODE_IPS} | cut -d',' -f1)
        - >
          if [ "${AGG_NODES_PER_WORKER}" -gt 1 ]; then
            if [[ "${SLURM_NODEID}" == "0" ]]; then
              unset CUDA_VISIBLE_DEVICES
              ray start --head --port=6379
            else
              export RAY_worker_register_timeout_seconds=1200
              ray start --address ${FIRST_NODE_IP}:6379
            fi
            while true; do
              if ray status | grep "${AGG_GPUS_PER_WORKER}.0 GPU"; then
                break
              else
                echo "Waiting for Ray cluster GPUs to be available in ray status..."
                sleep 5
              fi
            done
            echo "Ray cluster GPUs are now available."
          else
            echo "Do not need to setup ray cluster because worker only needs ${AGG_GPUS_PER_WORKER} GPUs, and GPUS_PER_NODE is ${{ variables.GPUS_PER_NODE }}"
          fi
        - >
          if [[ "${SLURM_NODEID}" == "0" ]]; then
            EXTRA_RAY_ARGS=""
            if [ "${AGG_NODES_PER_WORKER}" -gt 1 ]; then
              EXTRA_RAY_ARGS="--distributed-executor-backend ray"
            fi
            python3 -m dynamo.vllm --model ${{ artifacts.LOCAL_MODEL_PATH.path }} \
            --served-model-name ${{ variables.SERVED_MODEL_NAME }} \
            --tensor-parallel-size ${AGG_TP_SIZE} \
            --pipeline-parallel-size ${AGG_PP_SIZE} \
            --data-parallel-size ${AGG_DP_SIZE} \
            --kv-cache-dtype ${{ variables.KV_CACHE_DTYPE }} \
            --no-enable-prefix-caching \
            --block-size 128 \
            --max-num-seqs ${AGG_BATCH_SIZE} \
            --max-num-batched-tokens ${AGG_MAX_NUM_TOKENS} ${EXTRA_RAY_ARGS} ${EXTRA_AGG_ARGS}
          else
            echo "This is a worker node, do not need to run vllm launch cmd, but remember to setup ray cluster and launch in the master node"
            sleep 3600
          fi
      resources:
        gpus:
          count: ${{ variables.AGG_GPUS_PER_WORKER }}
      depends_on:
        - frontend_server
      probes:
        readiness:
          http_post:
            url: "http://${{ backends.slurm_cluster.nodes[0].ip_address }}:8000/v1/chat/completions"
            headers:
              Content-Type: "application/json"
            body: '{"model": "${{ variables.SERVED_MODEL_NAME }}", "messages": [{"role": "user", "content": "hi"}], "max_tokens": 1}'
          timeout: 600
          interval: 20
        failure:
          log_watch:
            match_pattern: "Traceback (most recent call last)"
            match_count: 5
          interval: 30
