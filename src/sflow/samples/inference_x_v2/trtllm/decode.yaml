# Decode server task and its configuration.
# Merge all files for a complete run:
#   sflow run -f backends_operators.yaml -f workflow.yaml -f prefill_task.yaml -f decode_task.yaml -f benchmark_task.yaml

version: "0.1"

variables:
  # Decode Server Configuration
  NUM_GEN_SERVERS:
    description: "Number of generation/decode servers"
    value: 1
  GEN_TP_SIZE:
    description: "Generation tensor parallel size"
    type: integer
    value: 2
  GEN_DP_SIZE:
    description: "Generation data parallel size"
    type: integer
    value: 1
  GEN_EP_SIZE:
    description: "Generation expert parallel size"
    type: integer
    value: 1
  GEN_MOE_TP_SIZE:
    description: "Generation MOE tensor parallel size"
    type: integer
    value: 1
  GEN_PP_SIZE:
    description: "Generation pipeline parallel size"
    type: integer
    value: 1
  GEN_GPUS_PER_WORKER:
    description: "GPUs per decode worker"
    type: integer
    value: ${{ variables.GEN_TP_SIZE * variables.GEN_DP_SIZE * variables.GEN_PP_SIZE }}
  GEN_BATCH_SIZE:
    description: "Generation batch size"
    value: 128
  GEN_MAX_NUM_TOKENS:
    description: "Generation max number of tokens"
    value: 4096
  GEN_MAX_SEQ_LEN:
    description: "Generation max sequence length"
    value: 2304
  GEN_FREE_GPU_MEMORY_FRACTION:
    description: "Generation free GPU memory fraction"
    value: 0.9
  GEN_ENABLE_ATTENTION_DP:
    description: "Generation enable attention DP"
    value: false
  EXTRA_DECODE_ARGS:
    description: "Extra decode arguments"
    value: ""

artifacts:
  - name: DECODE_CONFIG
    uri: file://decode_config.yaml
    content: |
      tensor_parallel_size: ${{ variables.GEN_TP_SIZE }}
      moe_expert_parallel_size: ${{ variables.GEN_TP_SIZE }}
      enable_attention_dp: ${{ variables.GEN_ENABLE_ATTENTION_DP }}
      pipeline_parallel_size: ${{ variables.GEN_PP_SIZE }}
      max_batch_size: ${{ variables.GEN_BATCH_SIZE }}
      max_num_tokens: ${{ variables.GEN_MAX_NUM_TOKENS }}
      max_seq_len: ${{ variables.GEN_MAX_SEQ_LEN }}
      cuda_graph_config:
        enable_padding: true
        max_batch_size: ${{ variables.GEN_BATCH_SIZE }}
      print_iter_log: true
      enable_chunked_prefill: false
      kv_cache_config:
        enable_block_reuse: false
        free_gpu_memory_fraction: ${{ variables.GEN_FREE_GPU_MEMORY_FRACTION }}
        dtype: ${{ variables.KV_CACHE_DTYPE }}
      cache_transceiver_config:
        max_tokens_in_buffer: ${{ variables.CTX_MAX_NUM_TOKENS }}
        backend: DEFAULT
      stream_interval: 20

workflow:
  name: dynamo_benchmark
  tasks:
    - name: decode_server
      operator:
        name: dynamo
        ntasks: ${{ variables.GEN_GPUS_PER_WORKER }}
        ntasks_per_node: ${{ [ variables.GEN_GPUS_PER_WORKER, variables.GPUS_PER_NODE ] | min }}
      replicas:
        count: ${{ variables.NUM_GEN_SERVERS }}
        policy: "parallel"
      script:
        - set -x
        - echo ${CUDA_VISIBLE_DEVICES}
        - export TLLM_LOG_LEVEL=INFO
        - export TRTLLM_MOE_ENABLE_ALLTOALL_WITHOUT_ALLGATHER=1
        - export TRTLLM_MOE_USE_LOW_PRECISION_COMBINE=1
        - env | grep TLLM
        - env | grep UCX
        - unset UCX_TLS
        - >
          trtllm-llmapi-launch python3 -m dynamo.trtllm
          --model-path ${{ artifacts.LOCAL_MODEL_PATH.path }}
          --served-model-name ${SERVED_MODEL_NAME}
          --disaggregation-mode decode
          --extra-engine-args ${{ artifacts.DECODE_CONFIG.path }} ${EXTRA_DECODE_ARGS}
      resources:
        gpus:
          count: ${{ variables.GEN_GPUS_PER_WORKER }}
      depends_on:
        - frontend_server
      probes:
        readiness:
          http_post:
            url: "http://${{ backends.slurm_cluster.nodes[0].ip_address }}:8000/v1/chat/completions"
            headers:
              Content-Type: "application/json"
            body: '{"model": "${{ variables.SERVED_MODEL_NAME }}", "messages": [{"role": "user", "content": "hi"}], "max_tokens": 1}'
          timeout: 1200
          interval: 20
        failure:
          log_watch:
            match_pattern: "Traceback (most recent call last)"
            match_count: 5
          interval: 30
      retries:
        count: 3
        interval: 30
        backoff: 2
